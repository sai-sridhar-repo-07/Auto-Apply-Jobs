# ─── JobCraft — Job Portals & Company Tracker ────────────────────────────────
# Copy this file to config/portals.yml and customize.
# This drives the job discovery scanner.

# Keywords to include/exclude when filtering discovered jobs
positive_keywords:
  - senior
  - staff
  - principal
  - lead
  - engineer
  - manager

negative_keywords:
  - junior
  - intern
  - "entry level"
  - java
  - ".net"
  - blockchain
  - web3

# Companies to track — add as many as you want
companies:
  # Big Tech
  - name: "Stripe"
    careers_url: "https://stripe.com/jobs"
    greenhouse_id: "stripe"
    category: "fintech"

  - name: "Vercel"
    careers_url: "https://vercel.com/careers"
    greenhouse_id: "vercel"
    category: "devtools"

  - name: "Linear"
    careers_url: "https://linear.app/careers"
    category: "devtools"

  - name: "Notion"
    careers_url: "https://www.notion.so/careers"
